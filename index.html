<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pena Freestyle</title>
<style>
*{margin:0;
    padding:0;box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif
}

    body{
        background:#b2b59c
    }

    header{
    background-color: rgba(53, 51, 51, 0.7);
    color:#fffdfd;padding:10px 24px;
    display:flex;justify-content:space-between 
}

    .screen{
    display:none;
    padding:24px;max-width:1000px;
    margin:auto
}

    .active{
    display:block
    }

    .card{
    background:#fff;
    padding:25px;border-radius:16px;
    box-shadow:0 2px 5px rgba(0,0,0,.08)
}

    h1,h2{
        margin-bottom:18px
        
    }
    input,select,button
    {width:100%;
    padding:14px;
    border-radius:10px;border:1px solid #d1d5db;margin-top:6px;margin-bottom:16px
}

    button{
        border:none;
        background:#0e121a;
        color:#fff;font-weight:700;
        cursor:pointer
    }
    .big-btn{
        height:90px;font-size:22px
    }
    .success,.error{
        display:none;
        padding:15px;border-radius:10px;
        margin-top:12px;color:#fff
    }
    .success{
        background:#16a34a
    }
    .error{
        background:#dc2626
    }
    .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px
    }
    .info{
        padding:10px;
        border-bottom:1px solid #eee}
    @media(max-width:768px)
    {
        .grid{grid-template-columns:1fr}
        }

         .footer{ 
        background:#2d2e2c; 
        backdrop-filter:blur(10px); 
        border-radius:20px; 
        margin-top:83px; 
        padding:10px 15px 10px; 
        color:white; 
        box-shadow:0 5px 25px rgba(0,0,0,0.3); 
    
    } 
    .footer-container{
    display:flex; 
    justify-content:space-between; 
    gap:40px; flex-wrap:wrap; 
    } 
    .footer-logo h2{
    font-size:28px;
    margin-bottom:10px;
    border:none;
    padding-left:0;
    color:white; 
}
     .footer-logo p{
    color:#f9f6f6;
    line-height:1.6; 
    } 
    .footer-links, .footer-social{
    display:flex; 
    flex-direction:column; 
    
    } 
    .footer-links h3, .footer-social h3{ 
    margin-bottom:15px; 
    color:#fff; 
    
    } 
    .footer a{
    color:#d1d5db; 
    text-decoration:none; 
    margin-bottom:10px; 
    transition:0.3s; 
    }
     .footer a:hover{
     color:#60a5fa;
      transform:translateX(5px);
     } 
     .footer-bottom{
     margin-top:30px;
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:20px;
    text-align:center;
    color:#9ca3af; 
    font-size:14px; 
    }

</style>
</head>
<body>
    
    <header>
        <img src="equipe_de_T-removebg-preview.png" alt="Logo" width="150">
        <div id="operatorName">Não autenticado: </div>
    </header>
    <br><br><br><br><br>
    <section id="login" class="screen active">
        <div class="card">
            <h1>Login do Operador</h1>
            <label>Matrícula</label>
            <input id="matricula" placeholder="Digite sua matrícula">
            <label>Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha">
            <button onclick="login()">Entrar</button>
        </div>
    </section>
        <br><br><br><br><br><br>
    <section id="dashboard" class="screen">
        <div class="card">
            <h1>Menu Principal</h1>
            <button class="big-btn" onclick="show('consulta')">CONSULTAR OP / LOTE</button>
            <button class="big-btn" onclick="show('movimentacao')">MOVIMENTAR OP / LOTE</button>
        </div>
    </section>

    <section id="consulta" class="screen">
        <div class="card">
            <h2>Consulta OP / Lote</h2>
            <input id="codigoConsulta" autofocus placeholder="Leia ou digite a OP/Lote">
            <button onclick="consultar()">Buscar</button>
            <div id="consultaResultado"></div>
            <button onclick="show('dashboard')">Voltar</button>
        </div>
    </section>

    <section id="movimentacao" class="screen">
        <div class="card">
        <h2>Movimentação entre Setores</h2>

        <label>OP</label>
        <input id="op" value="20260001">

        <label>Origem</label>
        <input id="origem" value="Corte" readonly>

        <label>Destino</label>
        <select id="destino">
        <option value="">Selecione</option>
        <option>Costura</option>
        <option>Acabamento</option>
        <option>Expedição</option>
    </select>

    <label>Quantidade</label>
    <input id="quantidade" type="number" value="700" min="1">

    <button id="btnMov" onclick="movimentar()">Confirmar Movimentação</button>

    <div id="ok" class="success"></div>
    <div id="erro" class="error"></div>

    <button onclick="show('dashboard')">Voltar</button>
    </div>
</section>
    <br><br><br><br><br><br><br><br>
    <footer class="footer">
    <div class="footer-container">
    <div class="footer-logo"> 
        <h2> <img src="pena-removebg-preview (1).png" alt="" width="200px"></h2> 
        <p> Consulta e Movimentação de OP e Lotes.<br> Criado e Desenvolvido pela Equipe de T.I. </p>
     </div> <div class="footer-social">
         <h3>Redes Sociais</h3>
        <a href="https://www.instagram.com/penafreestyle/">Instagram</a>
        <a href="https://www.tiktok.com/@penafreestyle">TikTok</a> 
        <a href="https://www.youtube.com/@penafreestyle">YouTube</a> 
    </div>
 </div> 
 <div class="footer-bottom"> © 2026 Pena Freestyle - Todos os direitos reservados </div> 
</footer>

<script>
    function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    }

    function login(){
    const m=document.getElementById('matricula').value.trim();
    const s=document.getElementById('senha').value.trim();
    if(!m||!s){alert('Informe matrícula e senha');return;}
    document.getElementById('operatorName').innerText='Operador: '+m;
    show('dashboard');
    }

    function consultar(){
    const codigo=document.getElementById('codigoConsulta').value.trim();
    if(!codigo){alert('Informe a OP');return;}

    const dados={
    op:codigo,
    produto:'Camiseta Básica Azul',
    planejado:1000,
    produzido:650,
    saldo:350,
    setor:'Costura'
    };

    document.getElementById('consultaResultado').innerHTML=`
    <div class="card" style="margin-top:15px">
    <div class="info"><b>OP:</b> ${dados.op}</div>
    <div class="info"><b>Produto:</b> ${dados.produto}</div>
    <div class="info"><b>Planejado:</b> ${dados.planejado}</div>
    <div class="info"><b>Produzido:</b> ${dados.produzido}</div>
    <div class="info"><b>Saldo:</b> ${dados.saldo}</div>
    <div class="info"><b>Setor Atual:</b> ${dados.setor}</div>
    </div>`;
    }

    function movimentar(){
    const origem=document.getElementById('origem').value;
    const destino=document.getElementById('destino').value;
    const btn=document.getElementById('btnMov');
    const ok=document.getElementById('ok');
    const erro=document.getElementById('erro');

    ok.style.display='none';
    erro.style.display='none';

    if(!destino){
    erro.innerText='Selecione o setor de destino';
    erro.style.display='block';
    return;
    }

    if(origem===destino){
    erro.innerText='Destino não pode ser igual à origem';
    erro.style.display='block';
    return;
    }

    btn.disabled=true;
    btn.innerText='Processando...';

    setTimeout(()=>{
    ok.innerText='Movimentação registrada com sucesso!';
    ok.style.display='block';
    btn.disabled=false;
    btn.innerText='Confirmar Movimentação';

    setTimeout(()=>show('dashboard'),3000);
    },2000);
    }

    document.getElementById('codigoConsulta').addEventListener('keypress',e=>{
    if(e.key==='Enter'){e.preventDefault();consultar();}
    });
</script>
</body>
</html>
