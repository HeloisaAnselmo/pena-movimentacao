<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pena Freestyle</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    

    <section id="login" class="screen active">
        <div class="card card-login">
            <h1>Login do Operador</h1>
            <label for="matricula">Usuário</label>
            <input id="matricula" placeholder="Digite seu usuário">
            
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha">
            
            <button onclick="login()">Entrar</button>
        </div>
    </section>

    <section id="dashboard" class="screen">
    <div class="card">
        <h1 class="branco">Menu Principal</h1>

        <button class="big-btn" onclick="show('movimentacao')">
            MOVIMENTAR OP
        </button>

        <button class="big-btn" onclick="show('consulta')">
            CONSULTA DE PRODUÇÃO
        </button>

    </div>
</section>

<section id="consulta" class="screen">

    <div class="card">

        <h2 class = "branco">Consulta de Produção</h2>

        <div class="consulta-header">

    <div class="campo">
        <label>CONSULTAR POR</label>
        <select id="tipoConsulta" onchange="alterarTipoConsulta()">
                 <option value="op">OP</option> 
                <option value="produto">Produto</option> 
                <option value="fase">Fase</option> 
            </select>
        </select>
    </div>

    <div class="campo" id="campoTexto">
        <label id="lblConsulta">CONSULTAR</label>
        <input id="valorConsulta" placeholder="Digite a OP">
    </div>

    <div class="campo" id="campoFase" style="display:none;">
        <label>Fase</label>
            <select id="consultaFase">
                <option value="">Escolher</option> 
                <option value="PCP">PCP</option>
                <option value="Corte">Corte</option> 
                <option value="Almoxarifado">Almoxarifado</option> 
                <option value="Estamparia">Estamparia</option> 
                <option value="Costura">Costura</option> 
                <option value="Acabamento">Acabamento</option> 
            </select>
        </select>
    </div>

    <div class="campo">
        <label>TOTAL EM PRODUÇÃO</label>
        <input id="totalEmProducao" readonly>
    </div>

</div>

        <div class="botoes">
            <button onclick="buscarConsulta()">
                Buscar
            </button>

            <button class="btn-secundario" onclick="limparConsultaProducao()">
                Limpar
            </button>
        </div>

        <div id="resultadoTabela" class="tabela-consulta">
            <div class="tabela-container">
        <table>
            <thead class="branco">
                <tr>
                    <th>Emissão</th>
                    <th>OP</th>
                    <th>Produto</th>
                    <th>Quant. original</th>
                    <th>Quant. em processo</th>
                </tr>
            </thead>

             <tbody id="resultadoConsulta">
             </tbody>

        </table>
        </div>
        </div>

        <button onclick="show('dashboard')">
            Voltar
        </button>

    </div>

</section>

    <section id="movimentacao" class="screen">
        <div class="card">
            <h2>Movimentação de OP</h2>

            <label for="codigoConsulta">Consultar OP</label>
            <input id="codigoConsulta" placeholder="Leia ou digite a OP">
            <div class="botoes">
                <button onclick="consultar()">Buscar</button>
                <button onclick="limparConsulta()" class="btn-secundario">Limpar</button>
            </div>

            <div id="consultaResultado"></div>
            
<div class="op-header">
    <div>
        <label>OP</label>
        <input id="op" class="cinza" readonly>
    </div>

    <div>
        <label>Referência:</label>
        <input id="produto" class="cinza" readonly>
    </div>

    <div>
        <label>Quantidade em processo:</label>
        <input id="quantidade" class="cinza" readonly>
    </div>

    <div>
        <label>Data de Emissão:</label>
        <input id="dataEmissao" class="cinza" readonly>
    </div>
</div>
<div class="campo-largo">
        <label>Produto:</label>
        <input id="descricao" readonly style="background-color: rgba(128, 128, 128, 0.568);">
    </div>
            
            <div class="movimentacao-layout">
                <div class="box origem">
                    <h3>Onde a OP está</h3>
                    <label>Setor Atual</label>
                    <input id="origem" readonly>
                    <label>Descrição da Fase</label>
                    <input id="faseAtual" readonly>
                    <label>Descrição do Recurso</label>
                    <input id="recursoAtual" readonly>
                </div>

                <div class="seta">➜</div>

                <div class="box destino">
                    <h3>Destino da OP</h3>
                    <label>Destino</label>
                    <input id="destino" readonly>
                    <label>Descrição da Fase</label>
                    <input id="faseDestino" readonly>
                    <label>Descrição do Recurso</label>
                    <input id="recursoDestino" readonly>
                </div>
            </div>

            <input type="hidden" id="tarefa_atual">
            <input type="hidden" id="proxima_tarefa">
            <input type="hidden" id="proximo_setor">
            <input type="hidden" id="proxima_fase">
            <input type="hidden" id="proximo_recurso">

        
            <button id="btnMov" onclick="movimentar()">Confirmar Movimentação</button>

            <div id="ok" class="success"></div>
            <div id="erro" class="error"></div>

            <button onclick="show('dashboard')">Voltar</button>
        </div>
    </section>
    <footer id="footerSistema">
        <img src="img/pena-removebg-preview (1).png" alt="" width="150">
        <div id="operatorName">Não autenticado: </div>
        <button onclick="logout()" class="btn-sair">Sair</button>
    </footer>

    

    <script src="src/script.js"></script>
</body>
</html>
