<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pena Freestyle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    

    <section id="login" class="screen active">
        <div class="card card-login">
            <h1>Login do Operador</h1>
            <label for="matricula">Usuário</label>
            <input id="matricula" placeholder="Digite seu usuário">
            
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha">
            
            <button onclick="login()">Entrar</button>
        </div>
    </section>

    <section id="dashboard" class="screen">
        <div class="card">
            <h1>Menu Principal</h1>
            <button class="big-btn" onclick="show('movimentacao')">
                 CONSULTAR / MOVIMENTAR OP
            </button>
        </div>
        
    </section>

    <section id="movimentacao" class="screen">
        <div class="card">
            <h2>Movimentação de OP</h2>

            <label for="codigoConsulta">Consultar OP</label>
            <input id="codigoConsulta" placeholder="Leia ou digite a OP">
            <div class="botoes">
                <button onclick="consultar()">Buscar</button>
                <button onclick="limparConsulta()" class="btn-secundario">Limpar</button>
            </div>

            <div id="consultaResultado"></div>
            <br>

            <div class="op-header">
                <div>
                    <label>OP</label>
                    <input id="op" readonly>
                </div>
                <div>
                    <label>Referência</label>
                    <input id="produto" readonly>
                </div>
                <div>
                    <label>Quantidade em processo</label>
                    <input id="quantidade" readonly>
                </div>
                <div>
                    <label>Data de Emissão</label>
                    <input id="dataEmissao" readonly>
                </div>
                <div class="campo-largo">
                    <label>Produto</label>
                    <input id="descricao" readonly>
                </div>
            </div>

            <div class="movimentacao-layout">
                <div class="box origem">
                    <h3>Onde a OP está</h3>
                    <label>Setor Atual</label>
                    <input id="origem" readonly>
                    <label>Descrição da Fase</label>
                    <input id="faseAtual" readonly>
                    <label>Descrição do Recurso</label>
                    <input id="recursoAtual" readonly>
                </div>

                <div class="seta">➜</div>

                <div class="box destino">
                    <h3>Destino da OP</h3>
                    <label>Destino</label>
                    <input id="destino" readonly>
                    <label>Descrição da Fase</label>
                    <input id="faseDestino" readonly>
                    <label>Descrição do Recurso</label>
                    <input id="recursoDestino" readonly>
                </div>
            </div>

            <input type="hidden" id="tarefa_atual">
            <input type="hidden" id="proxima_tarefa">
            <input type="hidden" id="proximo_setor">
            <input type="hidden" id="proxima_fase">
            <input type="hidden" id="proximo_recurso">

            <br>
            <button id="btnMov" onclick="movimentar()">Confirmar Movimentação</button>

            <div id="ok" class="success"></div>
            <div id="erro" class="error"></div>

            <button onclick="show('dashboard')">Voltar</button>
        </div>
    </section>
    <footer>
        <img src="img/equipe_de_T-removebg-preview.png" alt="Logo" width="80">
        <div id="operatorName">Não autenticado: </div>
        <button onclick="logout()" class="btn-sair">Sair</button>
    </footer>

    

    <script src="src/script.js"></script>
</body>
</html>
