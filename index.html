<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pena Freestyle</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="img/equipe_de_T-removebg-preview.png" alt="Logo" width="150">
        <div id="operatorName">Não autenticado: </div>
    </header>
    <br><br><br><br><br>
    <section id="login" class="screen active">
        <div class="card">
            <h1>Login do Operador</h1>
            <label>Matrícula</label>
            <input id="matricula" placeholder="Digite sua matrícula">
            <label>Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha">
            <button onclick="login()">Entrar</button>
        </div>
    </section>
        <br><br><br><br><br><br>
    <section id="dashboard" class="screen">
        <div class="card">
            <h1>Menu Principal</h1>
            <button class="big-btn" onclick="show('consulta')">CONSULTAR OP / LOTE</button>
            <button class="big-btn" onclick="show('movimentacao')">MOVIMENTAR OP / LOTE</button>
        </div>
    </section>

    <section id="consulta" class="screen">
        <div class="card">
            <h2>Consulta OP / Lote</h2>
            <input id="codigoConsulta" autofocus placeholder="Leia ou digite a OP/Lote">
            <button onclick="consultar()">Buscar</button>
            <div id="consultaResultado"></div>
            <button onclick="show('dashboard')">Voltar</button>
        </div>
    </section>


    <section id="movimentacao" class="screen">
        <div class="card">

            <h2>Movimentação entre Setores</h2>

            <div class="grid">

                <div>
                    <label>OP</label>
                    <input id="op" value="">


                    <label>Produto</label>
                    <input id="produto" value="" readonly>

                    <label>Descrição</label>
                    <input id="descricao" value="" readonly>

                    <label>Data de Emissão</label>
                    <input id="dataEmissao" type="">
                </div>

                <div>
                    <label>Setor Atual (Tarefa Atual)</label>
                    <input id="origem" value="Corte" readonly>

                    <label>Próxima Tarefa (Destino)</label>
                    <input id="destino" value="" readonly placeholder="">

                    <label>Quantidade</label>
                    <input id="quantidade" type="number" value="" readonly>

                    <input type="hidden" id="tarefa_atual">
                    <input type="hidden" id="proxima_tarefa">
                    <input type="hidden" id="proximo_setor">
                    <input type="hidden" id="proxima_fase">
                    <input type="hidden" id="proximo_recurso">
                </div>

            </div>

            <button id="btnMov" onclick="movimentar()">
                Confirmar Movimentação
            </button>

            <div id="ok" class="success"></div>
            <div id="erro" class="error"></div>

            <button onclick="show('dashboard')">
                Voltar
            </button>

        </div>
    </section>
